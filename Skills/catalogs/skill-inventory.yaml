    skills:
      - studio-brainstorm
      - studio-sprint-plan
      - studio-gate-check
      - studio-help

  quality:
    description: "Testing, smoke checks, release readiness, and regression evidence"
    routing: "Skills/skills/quality/AGENTS.md"
    skills:
      - regression-suite
      - smoke-check
      - test-setup
      - test-helpers
      - release-checklist

  bugs:
    description: "Bug reporting, triage, technical debt, retrospectives, and changelogs"
    routing: "Skills/skills/bugs/AGENTS.md"
    skills:
      - bug-report
      - bug-triage
      - tech-debt
      - retrospective
      - changelog

