# ─────────────────────────────────────────────────────────────────────────────
# GOAL
# ─────────────────────────────────────────────────────────────────────────────
goal: |
  Implement the LDP Decision Protocol integration layer for the Lux Unity
  Toolkit. This integration bridges Lina Decision Protocol's 5-step ethical
  verification framework (Acknowledge → Numbers → Ethics → Termination →
  Approval) with Lux's compile/test/build/screenshot/dynamic-code automation
  pipeline. The deliverables are:

    1. RustGateway Axum middleware (`ldp_middleware.rs`) that intercepts build,
       test, and dynamic-code commands to run pre-operation LDP verification
    2. CLI subcommands under `lux ldp *` (check, review, history, approve)
       with human-readable and --json output modes
    4. C# Editor script (`LuxLdpGate.cs`) providing in-editor decision prompts
       before destructive operations via the AI Bridge
    5. SQLite-backed decision record storage with lineage tracking using
       ldp-storage crate
    6. Integration skill package at Skills/ldp-decision-protocol/ with
       manifest.json, SKILL.md, and references/ documentation

# ─────────────────────────────────────────────────────────────────────────────
# CONSTRAINTS
# ─────────────────────────────────────────────────────────────────────────────
constraints:
  - Follow existing Rust patterns in main.rs — clap 4.5 derive, serde, anyhow, axum 0.7
  - All new endpoints must have tests in server.rs or gateway_cli_smoke.rs
  - No new external Rust dependencies beyond ldp-core + ldp-storage (already in workspace)
  - LDP middleware must NOT block read-only operations (context, get-logs, etc.)
  - Category B (Ethics) and C (Risk) hard-reject behavior preserved from ldp-core
  - All user-facing strings in Korean (matching LDP core convention)
  - CLI --json output must be parseable and stable (no breaking changes)
  - Middleware latency target: <500ms for Quick mode, <3s for Full mode
  - Skills/ldp-decision-protocol/ follows existing skill format (manifest.json + SKILL.md + references/)
  - Must not break any existing cargo tests (zero regressions)
  - Cross-platform support: Windows, macOS, Linux
  - LDP check failure must produce actionable homework list, not just pass/fail
  - Decision records use WAL mode SQLite for concurrent access safety

# ─────────────────────────────────────────────────────────────────────────────
# ACCEPTANCE CRITERIA
# ─────────────────────────────────────────────────────────────────────────────
acceptance_criteria:
  - id: AC-LDP-01
    description: >
      `lux ldp check --operation compile --level quick --domain game --json`
      returns valid JSON with verdict (PASS/REVIEW/REJECT), score (0-100),
      record_id string, and homework array. Exit code 0.
    verification: |
      cd Packages/com.linalab.lux/RustGateway~ && \
      cargo run -- ldp check --operation compile --level quick --domain game --json | \
      python3 -c "
      import sys,json
      d=json.load(sys.stdin)
      assert 'verdict' in d and d['verdict'] in ('PASS','REVIEW','REJECT')
      assert 'score' in d and isinstance(d['score'], int) and 0 <= d['score'] <= 100
      assert 'record_id' in d and isinstance(d['record_id'], str) and len(d['record_id']) > 0
      assert 'homework' in d and isinstance(d['homework'], list)
      print('AC-LDP-01 PASS')
      "
    status: PENDING

  - id: AC-LDP-02
    description: >
      `lux ldp review --operation dynamic-code --mode mixed --domain game`
      runs Socratic Step0 + Full Steps 1-5 and returns verdict with all
      step responses included. Exit code 0.
    verification: |
      cd Packages/com.linalab.lux/RustGateway~ && \
      cargo run -- ldp review --operation dynamic-code --mode mixed --domain game --json | \
      python3 -c "
      import sys,json
      d=json.load(sys.stdin)
      assert d['verdict'] in ('PASS','REVIEW','REJECT')
      assert 'steps' in d
      steps = d['steps']
      assert 'step0_socratic' in steps
      assert 'step1_acknowledge' in steps
      assert 'step2_numbers' in steps
      assert 'step3_ethics' in steps
      assert 'step4_termination' in steps
      assert 'step5_approval' in steps
      print('AC-LDP-02 PASS')
      "
    status: PENDING

  - id: AC-LDP-03
    description: >
      `lux ldp history --json` returns JSON array of decision records sorted
      by created_at descending. Each record contains id, title, verdict, score,
      operation, domain, and timestamp fields.
    verification: |
      cd Packages/com.linalab.lux/RustGateway~ && \
      # First create a record via check, then verify history
      cargo run -- ldp check --operation test --level quick --domain game --json > /dev/null && \
      cargo run -- ldp history --json | \
      python3 -c "
      import sys,json
      records = json.load(sys.stdin)
      assert isinstance(records, list) and len(records) >= 1
      r = records[0]
      assert 'id' in r and 'verdict' in r and 'score' in r
      assert 'created_at' in r
      print('AC-LDP-03 PASS')
      "
    status: PENDING

  - id: AC-LDP-04
    description: >
      `lux ldp approve <decision-id> --note "Reviewed"` marks a REVIEW
      verdict decision as approved and stores the approval note. Returns
      updated decision record. Exit code 0.
    verification: |
      cd Packages/com.linalab.lux/RustGateway~ && \
      RECORD_ID=$(cargo run -- ldp check --operation screenshot --level quick --json | \
        python3 -c "import sys,json; print(json.load(sys.stdin)['record_id'])") && \
      cargo run -- ldp approve "$RECORD_ID" --note "Visual check passed" --json | \
      python3 -c "
      import sys,json
      d = json.load(sys.stdin)
      assert d['verdict'] == 'PASS'
      assert 'approval_note' in d or 'note' in d
      print('AC-LDP-04 PASS')
      "
    status: PENDING

  - id: AC-LDP-05
    description: >
      RustGateway Axum middleware intercepts POST /api/compile and
      POST /api/dynamic-code endpoints, runs LDP quick check before
      forwarding. Verdict=REJECT returns 403 with homework. Verdict=PASS
      forwards to handler normally. Latency <500ms for Quick mode.
    verification: |
      cd Packages/com.linalab.lux/RustGateway~ && \
      cargo test ldp_middleware -- --nocapture 2>&1 | grep -E "(ldp_middleware_intercepts_pass|ldp_middleware_rejects_unethical)"
      # Assert: both middleware tests pass
      print("AC-LDP-05 PASS")
    status: PENDING

  - id: AC-LDP-07
    description: >
      Skills/ldp-decision-protocol/ directory exists containing manifest.json
      (name=ldp-decision-protocol, type=integration, dependencies includes
      lux-unity), SKILL.md (Korean primary with EN/JA sections), and
      references/ with 3 markdown files (ldp-protocol-overview.md,
      lux-ldp-mapping-table.md, ethical-checklist-for-unity-automation.md).
    verification: |
      ls Packages/com.linalab.lux/Skills/ldp-decision-protocol/manifest.json
      ls Packages/com.linalab.lux/Skills/ldp-decision-protocol/SKILL.md
      ls Packages/com.linalab.lux/Skills/ldp-decision-protocol/references/ldp-protocol-overview.md
      ls Packages/com.linalab.lux/Skills/ldp-decision-protocol/references/lux-ldp-mapping-table.md
      ls Packages/com.linalab.lux/Skills/ldp-decision-protocol/references/ethical-checklist-for-unity-automation.md
      python3 -c "
      import json
      m = json.load(open('Packages/com.linalab.lux/Skills/ldp-decision-protocol/manifest.json'))
      assert m['name'] == 'ldp-decision-protocol'
      assert m['type'] == 'integration'
      assert 'lux-unity' in m.get('dependencies', {})
      print('AC-LDP-07 PASS')
      "
    status: PENDING

  - id: AC-LDP-08
    description: >
      `lux skill list` shows ldp-decision-protocol entry with type=integration,
      version=1.0.0. `lux skill info ldp-decision-protocol` shows full info
      including 3 reference files and SKILL.md preview.
    verification: |
      cd Packages/com.linalab.lux/RustGateway~ && \
      cargo run -- skill list | grep "ldp-decision-protocol" && \
      cargo run -- skill info ldp-decision-protocol | grep -E "(Name:|Version:|Type:|References:)" && \
      echo "AC-LDP-08 PASS"
    status: PENDING

  - id: AC-LDP-09
    description: >
      All cargo tests pass including new LDP integration tests.
      `cargo test` in RustGateway~/ returns exit code 0 with all previous
      tests passing plus new LDP-specific tests (minimum 8 new tests).
    verification: |
      cd Packages/com.linalab.lux/RustGateway~ && cargo test 2>&1 | tail -5
      # Assert: "test result: ok" with >= (previous_count + 8) tests
      echo "AC-LDP-09 PASS"
    status: PENDING

  - id: AC-LDP-10
    description: >
      LDP hard-reject behavior works correctly: when an ethics (Category B)
      or risk (Category C) question receives a "No" response, the verdict
      is forced to REJECT regardless of total score. Homework includes
      the specific failed question ID and remediation guidance.
    verification: |
      cd Packages/com.linalab.lux/RustGateway~ && \
      cargo test ldp_hard_reject -- --nocapture 2>&1 | grep -E "(ethics_no_forces_reject|risk_no_forces_reject)"
      # Assert: both hard-reject tests pass
      echo "AC-LDP-10 PASS"
    status: PENDING

  - id: AC-LDP-11
    description: >
      Read-only operations (get-logs, clear-console, unity context,
      get-hierarchy, find-game-objects) bypass LDP middleware entirely
      with zero added latency (<5ms overhead).
    verification: |
      cd Packages/com.linalab.lux/RustGateway~ && \
      cargo test ldp_bypass_readonly -- --nocapture 2>&1 | grep -E "(readonly_bypass_context|readonly_bypass_logs)"
      # Assert: readonly bypass tests pass
      echo "AC-LDP-11 PASS"
    status: PENDING

  - id: AC-LDP-12
    description: >
      Decision record lineage tracking works: child decisions reference
      parent_id correctly, generation counter increments, and
      `lux ldp history --lineage <id>` shows full decision tree.
    verification: |
      cd Packages/com.linalab.lux/RustGateway~ && \
      cargo test ldp_lineage -- --nocapture 2>&1 | grep -E "(lineage_parent_set|generation_increments|lineage_tree_query)"
      # Assert: all 3 lineage tests pass
      echo "AC-LDP-12 PASS"
    status: PENDING

# ─────────────────────────────────────────────────────────────────────────────
# ONTOLOGY
# ─────────────────────────────────────────────────────────────────────────────
ontology:
  name: LuxLdpIntegration
  description: >
    Integration layer connecting Lina Decision Protocol (LDP) ethical
    verification engine with Lux Unity Toolkit's automation pipeline.
    Comprises Rust middleware, CLI subcommands, C# editor
    gate, and skill documentation.
  fields:
    - name: operation_type
      type: enum
      description: "Lux operation being verified: compile, test, build, screenshot, dynamic-code, play-mode, record, replay, launch, ai-generate"
      required: true
    - name: ldp_level
      type: enum
      description: "LDP review granularity: Full (20 questions), Standard (12), Quick (8)"
      required: true
    - name: ldp_mode
      type: enum
      description: "LDP execution mode: Direct (1-5), Socratic (0-5), Mixed (0-1-2-3-4-5)"
      required: true
    - name: ldp_domain
      type: enum
      description: "LDP domain: Generic, Game, Grant. Lux uses Game by default."
      required: false
      default: "Game"
    - name: verdict
      type: enum
      description: "Final decision: PASS (>=85), REVIEW (60-84), REJECT (<60 or hard reject)"
      required: true
    - name: score
      type: integer
      description: "Composite score 0-100 from weighted category responses"
      required: true
    - name: record_id
      type: string
      description: "Unique decision record identifier (UUID or ULID)"
      required: true
    - name: homework
      type: array
      description: "Actionable items for REVIEW verdict resolution"
      required: false
    - name: lineage_parent_id
      type: string
      optional: true
      description: "Parent decision ID for lineage tracking"

# ─────────────────────────────────────────────────────────────────────────────
# EVALUATION PRINCIPLES
# ─────────────────────────────────────────────────────────────────────────────
evaluation_principles:
  - name: ldp_protocol_fidelity
    description: >
      All LDP integration points faithfully implement the 5-step protocol as
      defined in ldp-core. No steps skipped in Full mode. Hard-reject behavior
      for B/C categories preserved exactly.
    weight: 1.0

  - name: zero_regression
    description: >
      All existing Lux functionality (compile, run-tests, bridge, unity commands,
      skill system) remains unaffected. Zero regressions in existing tests.
    weight: 1.0

  - name: cli_correctness
    description: >
      All `lux ldp *` CLI commands produce exact expected output format,
      content, and exit codes. --json output is stable and parseable.
    weight: 0.95

  - name: middleware_performance
    description: >
      LDP middleware adds acceptable latency: <5ms for readonly bypass,
      <500ms for Quick mode, <3s for Full mode. No blocking on LDP engine
      initialization (warm pool).
    weight: 0.9

  - name: audit_trail_integrity
    description: >
      Decision records are immutable once written. Lineage references are
      correct. History queries return complete, ordered results. SQLite WAL
      mode prevents corruption under concurrent access.
    weight: 0.9

  - name: i18n_korean_primary
    description: >
      All user-facing LDP content (questions, feedback, error messages) is
      in Korean, consistent with ldp-core convention. Technical terms
      (DAU, gacha, etc.) kept as loanwords per existing style.
    weight: 0.75

  - name: code_quality
    description: >
      New code follows existing patterns: clap derive, serde, anyhow,
      axum 0.7. Minimal diff. No TODO/FIXME comments.
    weight: 0.8

  - name: test_coverage
    description: >
      Comprehensive tests: middleware (pass/reject/bypass), CLI (all subcommands,
      --json modes, error cases), lineage tracking,
      hard-reject behavior. Minimum 8 new tests.
    weight: 0.85

