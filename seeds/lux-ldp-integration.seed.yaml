brownfield:
  project_type: brownfield

  context_references:
    - path: Packages/com.linalab.lux/RustGateway~/src/main.rs
      role: primary
      summary: >
        Rust CLI entry point (~2836 lines). LDP integration adds:
        Ldp(LdpArgs) in Command enum, LdpAction enum with
        Check/Review/History/Approve subcommands, LdpCheckOptions/LdpReviewOptions
        structs, ldp_check()/ldp_review()/ldp_history()/ldp_approve() functions,
        and ldp middleware registration in serve().

    - path: Packages/com.linalab.lux/RustGateway~/src/server.rs
      role: primary
      summary: >
        Axum HTTP server with route definitions. LDP middleware hooks into
        POST /api/compile, POST /api/run-tests, POST /api/dynamic-code routes
        via axum::middleware::from_fn_with_state.

    - path: Packages/com.linalab.lux/LuxEditor/
      role: reference
      summary: >
        Unity Editor C# scripts (namespace UnityEditor, assembly Linalab.LuxEditor).
        LDP integration adds LuxLdpGate.cs for in-editor decision prompts.

    - path: Packages/com.linalab.lux/Skills/lux-unity/
      role: primary
      summary: >
        Core skill dependency. manifest.json declares lux-unity >=1.0.0 as
        dependency. LDP skill builds on top of lux-unity command surface.

    - path: Packages/com.linalab.lux/Skills/ldp-decision-protocol/
      role: primary
      summary: >
        This integration skill package being created. Contains manifest.json,
        SKILL.md (trilingual), and 3 reference documents.

    - path: /tmp/lina-decision-protocol/crates/ldp-core/src/
      role: primary
      summary: >
        LDP core engine. Key types: Domain (Generic/Game/Grant),
        QuestionCategory (A-E), Verdict (Pass/Review/Reject),
        ExecutionMode (Direct/Socratic/Mixed), ReviewLevel (Full/Standard/Quick),
        DecisionRecord, DecisionSteps, LdpReviewInput, LdpReviewOutput.
        Engine state machine in engine.rs, scoring in scorer.rs.

    - path: /tmp/lina-decision-protocol/crates/ldp-storage/src/
      role: reference
      summary: >
        SQLite persistence crate for decision records. Provides
        store/load/query/delete operations with WAL mode support.

    - path: Packages/com.linalab.lux/RustGateway~/tests/gateway_cli_smoke.rs
      role: primary
      summary: >
        Integration test file (37+ tests). LDP integration adds ~8 new tests:
        ldp_check_json_parseable, ldp_review_mixed_mode, ldp_history_returns_records,
        ldp_approve_updates_verdict, ldp_middleware_intercepts_pass,
        ldp_middleware_rejects_unethical, ldp_hard_reject_ethics,
        ldp_hard_reject_risk, ldp_bypass_readonly, ldp_lineage_tracking.

    - path: Packages/com.linalab.lux/RustGateway~/Cargo.toml
      role: reference
      summary: >
        Workspace Cargo.toml. LDP crates (ldp-core, ldp-storage) added as
        path dependencies or git dependencies pointing to /tmp/lina-decision-protocol/.

  existing_patterns:
    - "clap derive: #[derive(Parser)] Cli → #[derive(Subcommand)] Command → nested args"
    - "Nested subcommands: Command::Skill(SkillArgs) → SkillAction {List, Info, Install, Remove, Update}"
    - "Error handling: anyhow::Result<()>, .with_context(), eprintln for warnings"
    - "Dual output: human-readable default + --json flag → serde_json::to_string_pretty"
    - "Axum middleware: axum::middleware::from_fn_with_state(state, handler)"
    - "Skill discovery: discover_skills() scanning core + project + global scopes"
    - "Integration tests: tests/gateway_cli_smoke.rs with #[tokio::test] async tests"
    - "C# convention: namespace UnityEditor, class prefix Lux, partial classes for large files"
    - "Korean UI strings: all LDP user-facing text in Korean per ldp-core convention"

  existing_dependencies:
    - "clap 4.5 (derive + env features)"
    - "serde / serde_json 1.0"
    - "anyhow 1.0"
    - "axum 0.7 + tokio 1.44"
    - "ldp-core (path dep to /tmp/lina-decision-protocol/crates/ldp-core)"
    - "ldp-storage (path dep to /tmp/lina-decision-protocol/crates/ldp-storage)"

