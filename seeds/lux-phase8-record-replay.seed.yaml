goal: >
  Implement session recording and replay for Unity Editor workflows. Extend the existing
  input record/replay system to capture full editor sessions (input events, AI actions,
  tool invocations, compile results) and replay them for bug reproduction and AI report
  generation. Build on Phase 6 JSONL event infrastructure for timeline visualization.

constraints:
- Brownfield Unity package
- Preserve Phase 1-7 functionality
- Build on existing record-input/replay-input infrastructure in AiBridgeEditor
- Use Phase 6 JSONL event log as the recording backbone
- Replay must be deterministic for input sequences and AI action ordering
- No real-time video recording (input/event replay only)

acceptance_criteria:
- session_recording_complete: A full editor session (input events + AI actions + tool calls)
  can be recorded into a structured JSONL session file. Recording is started/stopped via
  CLI command or editor menu. The session file includes timestamps, event types, and payloads.
- session_replay_complete: A recorded session can be replayed through the Unity editor,
  reproducing input events and AI actions in timestamp order. Replay timing is configurable
  (real-time, 2x speed, instant). Replay status is reported via CLI/API.
- session_timeline_complete: Session events are viewable as an ordered timeline via
  `lux session timeline --json`. The timeline includes event type, timestamp, duration,
  and summary for each step. Events are filterable by type and time range.
- session_report_complete: `lux session report <session-id>` generates a human-readable
  summary of what happened during a recorded session. The report includes action counts,
  error summaries, and duration statistics. Output available in text and JSON formats.
- session_verification_complete: cargo test passes with session recording/replay unit tests.
  Smoke test proves record -> replay -> timeline -> report cycle works end-to-end.

evaluation_principles:
- name: replay_fidelity
  description: Replayed sessions accurately reproduce original events.
  weight: 0.3
- name: usability
  description: Record/replay/timeline/report commands are intuitive and well-documented.
  weight: 0.25
- name: integration_quality
  description: Seamlessly integrates with Phase 6 event log infrastructure.
  weight: 0.25
- name: regression_resistance
  description: Existing functionality remains intact.
  weight: 0.2

exit_conditions:
- name: phase8_complete
  description: All Phase 8 acceptance criteria pass.
  criteria: all acceptance_criteria verified

