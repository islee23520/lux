goal: |
  Complete all 4 phases of LUX roadmap to build a production-ready Unity Editor
  AI adapter with: (1) extended Rust gateway with web UI serving and session management,
  (2) React+ReactFlow web SPA with AI tool terminal, (3) visual node-based CodexImage
  pipeline editor, (4) multi-AI tool integration (Claude, Codex, OpenCode). Each phase
  must be evaluated and verified before proceeding to the next.

constraints:
  - Unity 6000.0+ (Unity 6.x) compatibility required
  - Rust gateway uses Axum, tokio, serde - extend, do not replace
  - Web UI static files served from RustGateway~/ui/ directory
  - Web UI must work both embedded in Unity EditorWindow (WebView) AND external browser (localhost:17340/ui)
  - Rust gateway process must survive Unity recompiles and restarts
  - Existing /health, /schema, /events endpoints must remain backward compatible
  - Existing CodexImage pipeline engine and node types must continue working
  - Existing AI Bridge TCP server must not be broken
  - All communication between web UI and Unity goes through Rust gateway WebSocket
  - MIT license for all code
  - Heavily inspired by unity-cli-loop (hatayama) - attribution must remain in README

acceptance_criteria:
  # Phase 1: Rust Gateway Expansion
  - phase_1_complete: |
      Rust gateway serves static files from /ui/* route using tower-http ServeDir.
      GET /ui/ returns the SPA index.html.
      Session management API exists at /api/sessions (CRUD).
      Pipeline API exists at /api/pipeline for CodexImage integration.
      Existing /health, /schema, /events still work unchanged.
      Gateway starts and serves on configurable port with token auth.
      cargo test passes for all gateway tests including new endpoints.

  # Phase 2: Web UI SPA
  - phase_2_complete: |
      React+TypeScript SPA with ReactFlow node editor is built and deployable.
      SPA has two toggleable views: node editor (ReactFlow canvas) and AI tool terminal.
      Node editor can display existing CodexImage pipeline nodes visually.
      AI tool terminal panel can connect to at least one AI tool (Claude Code or OpenCode).
      SPA communicates with Unity via Rust gateway WebSocket /events endpoint.
      SPA loads when accessing localhost:PORT/ui in external browser.
      SPA builds to RustGateway~/ui/ as static files.
      Unity EditorWindow wraps the SPA via WebView for in-editor use.

  # Phase 3: CodexImage Node Editor
  - phase_3_complete: |
      Visual graph editing works: drag-drop nodes, connect ports, edit properties.
      Graph serialization: save/load pipeline workflows as JSON files.
      Node library browser with search functionality.
      Undo/redo and copy/paste in the node editor.
      Bridge between ReactFlow web UI and existing C# pipeline engine works end-to-end.
      All 6 existing node types render correctly in the visual editor.
      Executing a pipeline from the visual editor produces correct output.
      Existing CodexImage tests pass without modification.

  # Phase 4: Multi-AI Tool Integration
  - phase_4_complete: |
      Claude Code integration works via CLI from the web UI terminal.
      OpenAI Codex integration works from the web UI terminal.
      OpenCode integration works from the web UI terminal.
      Unified skill dispatch: AI tools can invoke Lux skills to control Unity.
      Sessions persist across tool switches (no data loss when toggling).
      Skills work consistently regardless of which AI tool is active.

ontology:
  name: LuxRoadmapPhase
  description: Represents a single phase in the LUX development roadmap with its deliverables and verification state
  fields:
    - name: phase_number
      type: number
      description: Phase sequence number (1-4)
    - name: phase_name
      type: string
      description: Human-readable phase name
    - name: status
      type: string
      description: Current phase status (pending, in_progress, evaluating, completed, failed)
    - name: deliverables
      type: array
      description: List of concrete deliverables for this phase
    - name: test_results
      type: object
      description: Test execution results and coverage data
    - name: verification_evidence
      type: array
      description: Evidence of manual and automated verification
    - name: regressions
      type: array
      description: Any regressions found during this phase
    - name: evaluation_score
      type: number
      description: Phase completion score (0.0-1.0)

evaluation_principles:
  - name: phase_sequential_completion
    description: Each phase must reach completed status with evaluation_score >= 0.8 before starting the next phase
    weight: 0.3
  - name: no_regressions
    description: All existing tests and functionality must continue working after each phase
    weight: 0.25
  - name: end_to_end_verification
    description: Each phase deliverable must be manually verified end-to-end, not just type-checked
    weight: 0.25
  - name: code_quality
    description: Code follows existing patterns, no type error suppression, no AI slop
    weight: 0.2

exit_conditions:
  - name: all_phases_complete
    description: All 4 phases have evaluation_score >= 0.8 and status completed
    criteria: phase_1.status == completed AND phase_2.status == completed AND phase_3.status == completed AND phase_4.status == completed
  - name: no_regressions_remaining
    description: No unresolved regressions across any phase
    criteria: count(all_phases.regressions) == 0
  - name: max_iterations_reached
    description: Safety exit if evolve exceeds reasonable iterations
    criteria: total_iterations >= 40

project_type: brownfield
context_references:
  - path: RustGateway~/src/main.rs
    role: primary
    summary: Main Rust gateway entry point with CLI and serve command
  - path: RustGateway~/src/server.rs
    role: primary
    summary: Axum HTTP/WS server with /health, /schema, /events endpoints
  - path: RustGateway~/src/protocol.rs
    role: primary
    summary: Event envelope protocol for Unity events
  - path: CodexImage/Editor/Pipeline/PipelineGraph.cs
    role: primary
    summary: Core pipeline graph with topological sort and async execution
  - path: CodexImage/Editor/UI/CodexImagePipelineWindow.cs
    role: primary
    summary: Read-only pipeline UI viewer to be replaced/augmented with web UI
  - path: CodexImage/Editor/Pipeline/ContextPromptNodes.cs
    role: reference
    summary: Existing node executors for context, prompts, output dirs
  - path: LuxEditor/LuxAutomationGateway.cs
    role: reference
    summary: C# HTTP gateway for AI-driven Unity operations
  - path: AiBridgeEditor/UnityAiBridgeTcpServer.cs
    role: reference
    summary: TCP server for external AI tool communication
  - path: Skills/lux-unity/
    role: reference
    summary: Skill definitions and references for AI agent integration

existing_patterns:
  - Rust gateway uses Axum router with shared state (Arc<AppState>)
  - Token authentication via x-lux-token header
  - Event protocol uses JSON envelopes with category field
  - Pipeline nodes implement typed input/output ports
  - CodexImage uses async execution with IProgressReporter
  - Unity integration via EditorWindow and [MenuItem] attributes
  - C# code uses NUnit for testing, async/await patterns
  - Discovery file mechanism for Unity-to-gateway communication

existing_dependencies:
  - axum = "0.8" (Rust HTTP framework)
  - tokio = "1" (Rust async runtime)
  - serde = "1" with derive (Rust serialization)
  - tower-http (to be added for ServeDir)
  - Unity 6000.0+ with UIToolkit
  - Newtonsoft.Json (Unity package)
  - com.unity.test-framework (Unity testing)
