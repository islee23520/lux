existing_patterns:
  - Rust gateway uses Axum 0.7, tokio, serde, and tower tests in RustGateway~/src/server.rs.
  - Signaling WebSocket already accepts x-lux-token header or query token.
  - /events currently accepts only x-lux-token and should mirror signaling auth compatibility.
  - Browser useWebRTC stores token in localStorage.lux-gateway-token and connects to signaling with role=web&token=...
  - RemoteViewer renders the video element and auto-connects when mounted.
  - Unity producer lazy-initializes the peer connection after browser SDP offer.
  - Unity WebRTC reflection backend starts EditorApplication.update pump for WebRTC.Update.
  - WebRTC addon tests use NUnit [Test] in Addons/webrtc/Tests/Editor.
  - C# namespace is Linalab.LuxEditor for WebRTC addon code in this branch.
  - No TODO/FIXME/HACK comments are allowed.

existing_dependencies:
  - Unity Editor 6000.3.13f1
  - Unity project path /Users/ilseoblee/workspace/linalab/neon-glitch
  - Package working dir /Users/ilseoblee/workspace/linalab/neon-glitch/Packages/com.linalab.lux
  - RustGateway Axum 0.7 and tokio 1
  - React 19 and TypeScript strict in RustGateway~/ui-src
  - com.unity.webrtc 3.0.0 optional addon dependency
  - Playwright MCP for browser E2E proof
  - STUN server stun:stun.l.google.com:19302
