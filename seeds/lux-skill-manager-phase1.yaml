# ─────────────────────────────────────────────────────────────────────────────
# GOAL
# ─────────────────────────────────────────────────────────────────────────────
goal: |
  Implement Phase 1 of the Lux Internal Skill Manager for the Unity automation
  CLI. Skills are pure metadata/documentation bundles (SKILL.md + manifest.json
  + references/) consumed by AI agents — they do NOT affect CLI command
  dispatch. Phase 1 delivers:
    1. manifest.json schema for skill package metadata
    2. Core skill directory (Packages/com.linalab.lux/Skills/) with one
       embedded skill (lux-unity) migrated from .opencode/skills/lux-unity/
    3. Multi-scope skill discovery: core + project (.lux/skills/) + global
       (~/.lux/skills/)
    4. CLI commands: `lux skill list` and `lux skill info <name>` with
       human-readable and --json output modes
    5. Graceful error handling for malformed/missing manifests
    6. Comprehensive cargo tests for all skill subsystem behavior

# ─────────────────────────────────────────────────────────────────────────────
# CONSTRAINTS
# ─────────────────────────────────────────────────────────────────────────────
constraints:
  - SKILL.md format preserved unchanged (YAML frontmatter + markdown body)
  - manifest.json sits alongside SKILL.md, never replaces it
  - No hotload or file watchers — skills loaded on-demand only (lazy-load)
  - Core skills embedded at Packages/com.linalab.lux/Skills/
  - Project skills scanned at .lux/skills/ (relative to CWD)
  - Global skills scanned at ~/.lux/skills/ (USERPROFILE on Windows)
  - Skills are a pure metadata/documentation layer — CLI command dispatch is hardcoded Rust logic, unaffected by skill presence
  - Cross-platform support for Windows, macOS, and Linux
  - No version resolution or comparison logic in Phase 1 — schema definition only
  - No dependency resolution in Phase 1 — dependencies field is empty object only
  - manifest.json parse failure must warn on stderr and skip the skill, exit code 0
  - Missing manifest.json in a skill directory must warn on stderr and skip, exit code 0
  - clap_complete shell completions must cover skill subcommands
  - Follow existing Rust patterns in main.rs — clap 4.5 derive, serde, anyhow
  - Only one core skill in Phase 1 — lux-unity
  - OpenCode-only client support for now
  - manifest.json name uses simple format (lux-unity), not reverse-domain (com.linalab.lux.unity)
  - All existing cargo tests must continue to pass

