goal: 'Complete LUX Phase 6 production stabilization by delivering project-scoped AI/editor/runtime event logging, JSONL persistence,
  CLI/API read paths, Project-Adapting Skill support, and production-ready redaction/retention. The result must let LUX tools
  and AI agents read step-by-step event lists from Unity projects without requiring an advanced dedicated timeline UI.

  '
constraints:
- Brownfield Unity package at /Users/ilseoblee/workspace/linalab/neon-glitch/Packages/com.linalab.lux
- Preserve existing LUX Phase 1-5 functionality and existing RustGateway, Unity Editor, AI bridge, skills, and UnityGitEditor
  behavior
- Default event storage path is <UnityProject>/UserSettings/LuxAiActionLog.jsonl
- CLI/API access must be project-path scoped and may additionally maintain a global index/cache
- Event storage path must be overrideable through environment/config
- Event schema must cover Editor user actions, AI work steps, and gameplay runtime custom events under one compatible model
- Runtime gameplay events must be usable through both a C# static API and ScriptableObject/serialized event channel wrapper
- Redaction must run before persistence, before API responses, and before broadcasts
- Retention policy must be implemented or explicitly configurable, not left as a TODO
- Do not include Phase 7 Native MCP Gateway, Phase 8 Record/Replay, Phase 9-11 visual regression/cross-platform CI/CD/WebRTC
  optional addon stabilization
- Advanced dedicated timeline UI, live dashboard, graph UI, and operational diagnostics dashboard are non-goals for this Seed
- Keep POSIX/macOS workflow compatible with the user's existing OpenCode/Ouroboros setup
acceptance_criteria:
- 'ai_action_log_schema_complete: A shared event schema represents Editor user actions, AI work steps, and gameplay runtime
  events. Events include stable identifiers, timestamp, project path or project id, source, category/type, summary/message,
  structured payload, redaction metadata, and retention metadata where applicable. Schema is documented and covered by serialization/deserialization
  tests.'
- 'jsonl_persistence_and_reading_complete: Events are persisted by default to <UnityProject>/UserSettings/LuxAiActionLog.jsonl.
  CLI/API can list, tail, and read recent events by project path. Storage location can be overridden by config/env. JSONL
  writes are append-safe and malformed/corrupt lines are handled without breaking the reader.'
- 'cli_api_contract_complete: Commands equivalent to lux ai-log tail --json, lux ai-log recent --json, lux ai-log context
  --json, and lux ai-log compact --json work against a project path. HTTP API for ai-log returns project-scoped event data
  and enforces the existing authentication model where applicable. /api/ai-log or the chosen endpoint returns 200 for authorized
  calls and rejects unauthorized calls.'
- 'unity_editor_event_logging_complete: Unity Editor user/system events are logged through LUX hooks without disrupting existing
  editor workflows. At least one automated or smoke test proves editor-originated events reach the JSONL log and are readable
  through CLI/API.'
- 'ai_work_step_logging_complete: AI work steps can be recorded with step name, status, tool/action metadata, summarized content,
  and redaction metadata. LUX tools can read the ordered AI step list from JSON/JSONL without a dedicated UI.'
- 'gameplay_runtime_event_contract_complete: A C# static API allows gameplay code to log events such as LuxRuntimeEvent.Log("enemy_death",
  payload). A ScriptableObject/serialized event channel wrapper is available for Unity-style serialized references. Smoke
  tests or sample code prove both paths emit events into the same schema.'
- 'project_adapting_skill_complete: Project metadata detection, compatibility judgment, and context slimming are implemented
  for LUX project-adapting skills. Workflows equivalent to lux skill install --adapt, lux skill info, incompatible skill install
  failure, and context slimming result verification are supported or clearly mapped to existing LUX CLI/API names. A lux-adaptation.json
  or equivalent output records adaptation decisions.'
- 'redaction_retention_complete: General secret patterns, Unity/project path sensitive data, and gameplay/play data sensitive
  payloads are redacted before persistence, API response, and broadcast. Redaction metadata records what class of content
  was redacted without leaking the original value. Regression tests prove raw secrets are not stored in the JSONL log. Retention
  policy is implemented/configurable and documented.'
- 'verification_gate_complete: cd RustGateway~ && cargo test passes. CLI/API ai-log commands pass in JSON mode. Unity/C# event
  logging smoke tests pass, including editor hook, static runtime API, and ScriptableObject event channel. C# diagnostics
  are clean or documented with no new blocking errors. Project-Adapting Skill install/info/incompatibility/context-slimming
  checks pass.'
evaluation_principles:
- name: production_safety
  description: Redaction, retention, auth, and corrupt-log handling must be reliable enough for production use.
  weight: 0.3
- name: end_to_end_readability
  description: LUX and external AI tools can read ordered project events from JSON/JSONL/CLI/API without relying on a UI.
  weight: 0.25
- name: unity_integration_quality
  description: Editor and runtime event APIs feel native to Unity and do not break existing package behavior.
  weight: 0.2
- name: project_adaptation_value
  description: Skill adaptation detects project metadata, judges compatibility, and reduces context effectively.
  weight: 0.15
- name: regression_resistance
  description: Existing Rust, Unity, and skill behavior remains intact with tests passing.
  weight: 0.1
exit_conditions:
- name: phase6_complete
  description: All Phase 6 acceptance criteria pass with verification evidence.
  criteria: all acceptance_criteria statuses are completed and verified
- name: no_sensitive_leaks
  description: No raw secret or sensitive payload is persisted, returned, or broadcast in tests.
  criteria: redaction regression tests pass and inspected JSONL/API output contains no raw secret samples
- name: no_blocking_regressions
  description: Existing LUX gateway, Unity, and skill tests remain passing.
  criteria: cargo tests, CLI checks, and Unity/C# smoke diagnostics report no blocking failures
