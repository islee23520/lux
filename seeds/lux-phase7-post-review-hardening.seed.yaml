goal: |
  Complete LUX Phase 7 Post-Review Hardening and Roadmap Phase 1 Foundation.
  This phase addresses all 4 improvement items from Lina's LDP review (PASS 94/100)
  of Phase 6, and lays the Rust gateway foundation for Roadmap Phase 1
  (Rust Gateway Expansion: static file serving + session management API).

  Deliverables:
  1. Test utility consolidation — extract shared helpers from 5 smoke test files
     into a common test module to eliminate duplication
  2. skill_adapter.rs modular split — break 925-line monolith into focused sub-modules
  3. Redaction pattern expansion — add regex-based detection for GitHub/AWS/OpenAI tokens
  4. C# test infrastructure hardening — improve LuxPhase6EditorSmokeTest reliability
  5. Roadmap P1 foundation: /api/sessions CRUD skeleton with in-memory store
  6. Roadmap P1 foundation: static file serving via tower-http ServeDir for /ui/* route

constraints:
  - Brownfield Unity package at /Users/ilseoblee/workspace/linalab/neon-glitch/Packages/com.linalab.lux
  - Preserve ALL existing Phase 6 functionality (AC1-AC8) — zero regressions
  - Existing cargo test must continue passing (288/291 baseline, P6 failures exempt)
  - Rust stack: Axum 0.7, tokio 1, clap 4.5, anyhow, serde (existing)
  - New dependency allowed: tower-http (for ServeDir, required by roadmap Phase 1)
  - C# conventions: namespace UnityEditor, Assembly Linalab.LuxEditor, class prefix Lux
  - No TODO/FIXME/HACK comments
  - All new endpoints/functions must have tests
  - Keep POSIX/macOS compatible
  - Do NOT implement full Roadmap Phase 1 web UI or React SPA — only Rust-side foundations

acceptance_criteria:

  # === LINA Review Improvement Items ===

  - lina_1_test_utils_consolidated: |
      A shared test utility module exists at RustGateway~/tests/common/mod.rs (or equivalent).
      It provides at minimum: temp_dir_unique() with AtomicU64 counter,
      write_jsonl_lines(), read_jsonl_lines(), create_temp_log_file(),
      assert_jsonl_line_count(), and make_sample_event().
      All 5 existing smoke test files (event_schema_smoke, jsonl_persistence_smoke,
      cli_api_contract_smoke, redact_smoke, and any using these helpers) import from
      this common module instead of defining their own duplicates.
      cargo test passes with all existing + new tests.

  - lina_2_skill_adapter_split: |
      RustGateway~/src/skill_adapter.rs is split into a module directory:
      RustGateway~/src/skill_adapter/ containing:
      - mod.rs (public facade, re-exports, ~50 lines)
      - compatibility.rs (structural validation, project metadata detection)
      - adaptation.rs (compatibility judgment, build_adaptation_decision output)
      - slimming.rs (context slimming logic)
      - metadata.rs (project metadata types and detection helpers)
      lib.rs updated to use `mod skill_adapter` (already does; ensure path resolves).
      All 16 existing skill_adapter unit tests still pass.
      No public API surface changes — external callers use same paths.

  - lina_3_redaction_expanded: |
      Redaction system gains regex-based secret pattern detection beyond
      simple Bearer/token= matching. At minimum these patterns MUST be detected
      and redacted as [REDACTED]:
      - GitHub Personal Access Tokens: ghp_[A-Za-z0-9]{36}+
      - AWS Access Key IDs: AKIA[0-9A-Z]{16}
      - OpenAI API Keys: sk-(openai|project)-[A-Za-z0-9]{20,}
      New tests in redact_smoke.rs or dedicated redact_patterns_smoke.rs prove
      each pattern matches and redacts correctly.
      Non-matching similar strings are NOT falsely redacted (false-positive tests).

  - lina_4_cs_test_hardening: |
      LuxPhase6EditorSmokeTest.cs gains improved reliability:
      - Test temp directories use GUID-based unique paths (no collisions)
      - Each test cleans up its own temp files in [TearDown]
      - Null/empty edge cases explicitly tested for LuxRuntimeEvent.Log()
      - At least 3 new C# edge-case tests added (null eventType fallback,
      empty payload dictionary, concurrent Log calls from multiple threads).
      All C# tests compile without errors (verified by LSP/diagnostics).

  # === Roadmap Phase 1 Foundation (Rust-side only) ===

  - p1_sessions_api_skeleton: |
      GET /api/sessions returns JSON array of session objects (id, created_at,
      updated_at, status, metadata). POST /api/sessions creates a new session.
      GET /api/sessions/:id returns a single session or 404.
      DELETE /api/sessions/:id deletes a session or 404.
      Sessions stored in-memory (HashMap<String, Session> inside AppState).
      Auth enforced via existing x-lux-token header middleware.
      Minimum 8 API contract tests (create, list, get, get-404, delete, delete-404,
      update-timestamp, empty-list).
      Endpoint returns proper HTTP status codes and Content-Type: application/json.

  - p1_static_file_serving: |
      GET /ui/ serves index.html from RustGateway~/ui/ directory.
      GET /ui/{path:*} serves static files (JS, CSS, images) from RustGateway~/ui/.
      Returns 404 for missing files (no directory listing).
      Uses tower-http::services::ServeDir (new Cargo.toml dependency).
      If RustGateway~/ui/ directory does not exist, endpoint returns 503 with
      clear error message (not a crash).
      Minimum 4 tests: serves index.html, serves nested asset, 404 for missing,
      graceful handling when ui/ dir absent.

