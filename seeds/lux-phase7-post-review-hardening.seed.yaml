  - Token authentication via x-lux-token header
  - Tests use temp_dir_unique() with AtomicU64 for parallel safety
  - Redaction functions return (String, RedactionMetadata) tuples
  - C# tests use NUnit [Test], [SetUp], [TearDown] attributes
  - Module splits use mod.rs as facade with private sub-modules
  - Error handling uses anyhow::Context for chained errors

