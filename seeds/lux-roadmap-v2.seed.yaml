goal: |
  Build LUX into a production-ready local-first Unity Editor AI automation toolkit.
  LUX bridges AI coding tools (Claude Code, OpenAI Codex, OpenCode), batch compilation,
  test execution, CodexImage pipelines, Git workflows, and a web-based local dashboard
  into one Editor-focused package — all running locally, no remote streaming.

  NOTE: This seed file is a template for initializing roadmap state.
  The canonical runtime truth is maintained in `.lux/roadmap.json`.

constraints:
  - Unity 6000.0+ (Unity 6.x) compatibility required
  - Rust gateway uses Axum 0.7, tokio 1, clap 4.5, anyhow, serde — extend, do not replace
  - Web UI is LOCAL ONLY — served from RustGateway~/ui/ via tower-http ServeDir
  - Web UI works both embedded in Unity EditorWindow (WebView) AND external browser (localhost)
  - Rust gateway process must survive Unity recompiles and restarts
  - Existing /health, /schema, /events endpoints must remain backward compatible
  - Existing CodexImage pipeline engine and node types must continue working
  - Existing AI Bridge TCP server must not be broken
  - All communication between web UI and Unity goes through Rust gateway WebSocket
  - MIT license for all code
  - Heavily inspired by unity-cli-loop (hatayama) — attribution must remain in README

out_of_scope:
  - "WebRTC / RTC Terminal / remote video streaming — NOT part of LUX"
  - "Remote browser access to Unity Editor — NOT supported"
  - "iOS companion app / PWA — separate package if ever needed"
  - "Windows/Linux editor support — macOS-first (paths prepared but untested)"

acceptance_criteria:

  phase_a_core_adapter:
    status: completed
    description: "Local-first Unity Editor integration layer for AI-assisted development"
    deliverables:
      - "macOS-first Unity Editor adapter with Lux Workbench (LuxEditor/)"
      - "AI Bridge TCP server and protocol handler (AiBridgeEditor/)"
      - "Unity Git integration with status, staging, history (UnityGitEditor/)"
      - "Codex Image generation pipeline with node-based execution (CodexImage/)"
      - "Rust lux CLI: compile, test, unity control, skill commands (RustGateway~/)"
      - "Automation guardrails: command blacklist, audit log, approval state"
      - "Skill Manager foundation: lux skill list/info CLI, core lux-unity skill"
    verification: "cargo test 134/134 pass, C# tests compile, CLI functional"

  phase_b_ai_event_system:
    status: completed
    description: "Structured AI event logging with JSONL persistence and redaction"
    deliverables:
      - "EventSource enum covering all event categories (8 types)"
      - "LuxEvent type alias for ergonomic usage"
      - "CLI/API contract: lux ai-log --json for machine-readable output"
      - "Editor lifecycle hooks (12 events: open/playmode/compile/domain-reload/etc.)"
      - "Runtime C# API: LuxRuntimeEvent.Log() for game-code instrumentation"
      - "AI Work Step append/read cycle with session-scoped context"
      - "Project-adapting Skill Adapter (5 modules: adaptation/compatibility/metadata/slimming)"
      - "Redaction engine with 22+ pattern types and regression tests"
      - "Sessions CRUD API (/api/sessions) with token auth"
      - "Static file serving (/ui/* via tower-http ServeDir)"
    verification: "cargo test 286/289 pass (98.9%), 3 pre-existing only"

  phase_c_local_web_dashboard:
    status: in_progress
    description: |
      React + TypeScript SPA serving as a local development dashboard.
      NOT a remote viewer — purely localhost tooling surface.
    deliverables:
      - "SPA shell loads at /ui/ with React 19 + TypeScript strict mode"
      - "Compile Panel: trigger batch compile, view results, watch auto-compile status"
      - "Test Panel: run EditMode/PlayMode tests, view results with pass/fail breakdown"
      - "Log Panel: view AI event log with filtering by source/category/time range"
      - "Skill Panel: list installed skills, install/remove/update from marketplace"
      - "Project Panel: show Unity project status, context snapshot, scene info"
      - "Session Manager: view/manage AI tool sessions (local only)"
      - "Dashboard Overview: unified status card grid (compile/test/log/skill/server)"
      - "All API calls go through Rust gateway (no direct Unity access from browser)"
      - "SPA builds to static files in RustGateway~/ui/"
    verification: |
      npx tsc --noEmit passes with zero errors.
      All panels render with mock data when gateway is offline.
      Real data flows correctly when gateway is running.
      No external CDN dependencies (self-contained build).

  phase_d_codeximage_visual_editor:
    status: planned
    description: "Interactive graph-based editing for CodexImage image generation pipelines"
    deliverables:
      - "ReactFlow node editor with drag-and-drop, typed port connections"
      - "All 6 node types: UnityContext, OutputDirectory, PromptTemplate, CodexGeneration, Segmentation, MaskPostProcessing"
      - "Node library browser with category grouping and search"
      - "Save/load pipeline workflows as JSON via /api/graphs"
      - "Undo/redo (40-step history stack) and copy/paste"
      - "Execute pipeline from visual editor via /api/graphs/:id/execute"
      - "Bridge between ReactFlow UI and existing C# PipelineGraph engine"
      - "Property panel for editing node parameters (prompts, paths, settings)"
    verification: |
      All 6 node types render correctly with correct port signatures.
      Save → reload produces identical graph structure.
      Execution from visual editor matches CLI execution output.
      Existing CodexImage tests pass without modification.

  phase_e_multi_ai_skill_dispatch:
    status: planned
    description: "Unified skill dispatch across multiple AI coding tools"
    deliverables:
      - "Tool selector: Claude Code, OpenAI Codex, OpenCode tabs (local terminals)"
      - "Skill dispatch panel: invoke compile/test/screenshot/logs/playmode/dynamic-code from any active AI tool"
      - "Server-side /api/tools/execute with WebSocket event broadcasting"
      - "Per-tool session tracking with command history (persisted locally)"
      - "Sessions persist across tool switches without data loss"
      - "Skill install/remove/update CLI fully operational"
      - "Multi-scope skill discovery: core, project (.lux/skills/), global (~/.lux/skills/)"
    verification: |
      Skill invocation works identically regardless of active AI tool.
      Session data survives tool switch (history, context preserved).
      No regressions in single-tool workflow.

ontology:
  name: LuxRoadmapV2
  description: LUX roadmap v2 — local-first Unity Editor AI automation toolkit (no remote streaming)
  fields:
    - { name: phase_id, type: string, description: "Phase identifier (A-E)" }
    - { name: phase_name, type: string, description: "Human-readable phase name" }
    - { name: status, type: string, description: "completed | in_progress | planned | deprecated" }
    - { name: deliverables, type: array, description: "List of concrete deliverables" }
    - { name: verification, type: string, description: "How completion is verified" }

evaluation_principles:
  - { name: sequential, description: "Complete each phase before starting next (C→D→E)", weight: 0.3 }
  - { name: no_regressions, description: "All existing tests must keep passing", weight: 0.3 }
  - { name: local_only, description: "No remote/network features; everything localhost", weight: 0.2 }
  - { name: quality, description: "No TODO/FIXME/HACK; TS strict; cargo test must pass", weight: 0.2 }

exit_conditions:
  - { name: all_done, criteria: "phase_A.status == completed AND phase_E.status == completed" }
  - { name: max_iterations, criteria: "total_iterations >= 50" }

project_type: brownfield
