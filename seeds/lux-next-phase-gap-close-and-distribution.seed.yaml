goal: |
  Close all verification gaps in LUX Phase 3 (CodexImage Node Editor) and Phase 4
  (Multi-AI Tool Integration), then harden the Addon Manager and CLI for production
  package distribution with GitHub-based access control.

  Phase A: Verify existing implementations with end-to-end integration tests.
  Phase B: Productionize Addon Manager + add CLI install command for Unity projects.

constraints:
  - Unity 6000.0+ (Unity 6.x) compatibility required
  - Rust gateway uses Axum 0.8, tokio 1, serde - extend, do not replace
  - Existing /health, /schema, /events endpoints must remain backward compatible
  - Existing CodexImage pipeline engine and node types must continue working
  - Existing AI Bridge TCP server must not be broken
  - All 7 linalab packages managed via same Addon Manager
  - GitHub repo visibility determines package access (public repo = public package, private repo = private package)
  - External user onboarding: LUX CLI install → CLI installs packages to target Unity project
  - Token auth (x-lux-token) for server, GitHub OAuth Device Flow for addon auth
  - No TODO, FIXME, or HACK comments in Rust code
  - cargo test must pass for all changes
  - MIT license for all code

acceptance_criteria:
  # Phase A: Verification & Integration Testing

  - a1_e2e_pipeline_test: |
      End-to-end test that exercises: ReactFlow web UI creates a pipeline graph →
      sends to Rust gateway POST /api/graphs/:id/execute → gateway dispatches to
      Unity via LuxPipelineWebBridge → PipelineGraphExecutor runs nodes →
      results flow back through gateway → web UI receives completion event.
      Test covers at least 3 node types from ContextPromptNodes.cs.
      Test file exists in RustGateway~/ or CodexImage/Tests/.
      cargo test and/or NUnit test passes.

  - a2_e2e_tool_session_test: |
      End-to-end test for AI tool session lifecycle: create session via
      POST /api/tools/sessions → execute tool command → receive streamed output →
      delete session. Verify session persists to JSONL and can be recovered after
      simulated restart (drop in-memory state, reload from disk).
      Test file exists in RustGateway~/src/server.rs or integration test module.

  - a3_e2e_unity_launch_test: |
      Test for Unity launch HTTP endpoint: POST /api/unity/launch with valid
      project path returns 200 with process info. GET /api/unity/status returns
      correct running/not-running state. Test handles case where Unity is not
      installed (graceful error, not panic). cargo test passes.

  - a4_addon_manager_test: |
      Test Addon Manager flows: register addon, start device flow, verify token
      scoping to accessible repos, list addons, check auth status, unregister.
      Test the HMAC-SHA256 token signing and verification. Test repo visibility
      detection via GitHub API mock or test fixtures. cargo test passes.

  - a5_stub_executor_audit: |
      Audit all stub executors in CodexImage pipeline. Document which are
      test-only utilities vs which represent missing production logic.
      If any production executors are missing, implement them.
      If all stubs are test-only, document this conclusion.

  # Phase B: Distribution Hardening

  - b1_token_lifecycle: |
      Addon tokens have configurable expiry (default 24h). Token renewal endpoint
      exists: POST /api/addons/auth/renew. Expired tokens return 401 with clear
      error message. Refresh flow re-validates GitHub repo access before issuing
      new token. cargo test covers expiry and renewal scenarios.

  - b2_package_visibility: |
      Addon Manager detects package visibility from GitHub repo: public repos
      are installable without auth, private repos require valid addon token.
      GET /api/addons/:id/visibility returns public/private status.
      CLI lux addon list --public shows only publicly available packages.
      cargo test passes.

  - b3_cli_install_command: |
      CLI command lux install <package-name> --project <unity-project-path> works.
      Resolves package-name to GitHub repo URL (com.linalab.{name} convention).
      For public packages: downloads and adds to project Packages/manifest.json.
      For private packages: triggers GitHub auth flow if no valid token exists.
      Validates target path is a Unity project (has Assets/ and ProjectSettings/).
      Reports success/failure with clear messages. cargo test passes.

  - b4_cli_addon_commands: |
      CLI commands for addon management:
      lux addon list - lists registered addons and auth status
      lux addon auth - starts GitHub Device Flow auth
      lux addon auth --status - checks current auth status
      All commands have --help output. cargo test passes.

  - b5_addon_discover_from_packages: |
      POST /api/addons/discover scans the project Packages/ directory for
      com.linalab.* packages, auto-registers them as addons, and checks their
      GitHub repo visibility. Returns discovered packages with visibility status.
      Works with the 7 known linalab packages. cargo test passes.

ontology:
  name: LuxNextPhase
  description: Represents a deliverable in the LUX gap-closing and distribution hardening phase
  fields:
    - name: phase
      type: string
      description: "A" for verification or "B" for distribution
    - name: deliverable_id
      type: string
      description: AC identifier (e.g., a1_e2e_pipeline_test)
    - name: status
      type: string
      description: pending, in_progress, completed, failed
    - name: test_results
      type: object
      description: Test execution results
    - name: verification_evidence
      type: array
      description: Evidence of verification

evaluation_principles:
  - name: test_first
    description: Every deliverable must have automated tests that pass before marking complete
    weight: 0.35
  - name: no_regressions
    description: All existing tests continue passing after changes
    weight: 0.25
  - name: production_readiness
    description: Phase B deliverables must handle edge cases (no Unity, no network, expired tokens)
    weight: 0.25
  - name: code_quality
    description: Follows existing patterns, no AI slop, no type error suppression
    weight: 0.15

exit_conditions:
  - name: all_a_complete
    description: All Phase A AC items have status completed
    criteria: a1 through a5 status == completed
  - name: all_b_complete
    description: All Phase B AC items have status completed
    criteria: b1 through b5 status == completed
  - name: no_regressions
    description: All pre-existing tests still pass
    criteria: cargo test result == 0 failures AND all NUnit tests pass
  - name: max_iterations
    description: Safety exit
    criteria: total_iterations >= 30

project_type: brownfield

context_references:
  - path: RustGateway~/src/server.rs
    role: primary
    summary: Axum HTTP/WS server with all endpoints - add integration tests here
  - path: RustGateway~/src/unity_launch.rs
    role: primary
    summary: Unity launch HTTP endpoints - needs e2e test
  - path: RustGateway~/src/addon_routes.rs
    role: primary
    summary: Addon REST endpoints - needs e2e test
  - path: RustGateway~/src/addon_auth.rs
    role: primary
    summary: GitHub OAuth Device Flow - needs token lifecycle test
  - path: RustGateway~/src/addon_store.rs
    role: primary
    summary: In-memory addon registry - needs visibility detection
  - path: CodexImage/Editor/Pipeline/PipelineGraph.cs
    role: primary
    summary: Pipeline graph with executors - audit stubs at lines 622-665
  - path: CodexImage/Editor/Pipeline/LuxPipelineWebBridge.cs
    role: primary
    summary: Pipeline execution bridge - key for e2e test
  - path: CodexImage/Editor/Pipeline/ContextPromptNodes.cs
    role: reference
    summary: Real node executor implementations
  - path: RustGateway~/src/session.rs
    role: reference
    summary: Session persistence to JSONL - lines 102-141
  - path: LuxEditor/LuxAIToolDispatcher.cs
    role: reference
    summary: Unified AI tool dispatch - lines 180-260
  - path: RustGateway~/ui-src/src/hooks/useGraphEditor.ts
    role: reference
    summary: Undo/redo (174-300) and copy/paste (302-317)
  - path: RustGateway~/src/main.rs
    role: primary
    summary: CLI entry point - add install and addon commands
  - path: CodexImage/Tests/Editor/LuxPipelineWebBridgeTests.cs
    role: reference
    summary: Existing unit tests for pipeline bridge

existing_patterns:
  - Rust gateway uses Axum router with shared state (Arc<GatewayState>)
  - Token authentication via x-lux-token header with require_token()
  - Event protocol uses JSON envelopes with category field
  - Pipeline nodes implement typed input/output ports
  - CodexImage uses async execution with IProgressReporter
  - Sessions persist to JSONL in .lux/sessions/
  - Addon tokens are HMAC-SHA256 signed with gateway token as key
  - CLI uses clap 4.5 with subcommands pattern
  - Tests use #[cfg(test)] mod tests pattern in Rust, NUnit [Test] in C#
  - Package naming convention: com.linalab.{name}
  - GitHub OAuth Device Flow for CLI/local server auth

existing_dependencies:
  - axum = "0.8" (Rust HTTP framework)
  - tokio = "1" (Rust async runtime)
  - serde = "1" with derive (Rust serialization)
  - clap = "4.5" (CLI argument parsing)
  - reqwest = "0.12" with json feature (HTTP client for GitHub API)
  - hmac = "0.12" + sha2 = "0.10" (token signing)
  - base64 = "0.22" (token encoding)
  - tower-http (static file serving)
  - Unity 6000.0+ with UIToolkit
  - Newtonsoft.Json (Unity package)
  - com.unity.test-framework (Unity testing)

known_packages:
  - com.linalab.lux
  - com.linalab.unity-log
  - com.linalab.easy-fps
  - com.linalab.easy-map-editor
  - com.linalab.unitybase.core
  - com.linalab.unitybase.steamworks
  - com.linalab.unity-codex-image
