goal: >
  Replace the Node.js McpHelper~ with a native Rust MCP server integrated into the lux CLI.
  LUX becomes a first-class MCP server exposing Unity compile, test, screenshot, hierarchy,
  dynamic-code, skill management, AI action log, and Unity context as MCP tools and resources.
  Both stdio (for Claude Code / Codex CLI) and SSE (for web clients) transports are supported.

constraints:
- Brownfield Unity package at /Users/ilseoblee/workspace/linalab/neon-glitch/Packages/com.linalab.lux
- Preserve existing LUX Phase 1-6 functionality
- Must be compatible with MCP specification 2025-03-26 (JSON-RPC 2.0)
- stdio transport via `lux mcp serve` subcommand
- SSE transport as optional mode alongside existing HTTP gateway
- Token authentication for SSE transport (reuse existing gateway auth)
- McpHelper~ Node.js helper remains functional but is deprecated in favor of Rust native
- No new external crate dependencies beyond tokio, serde, axum (already in Cargo.toml)
- Keep POSIX/macOS workflow compatible

acceptance_criteria:
- mcp_server_framework_complete: A Rust MCP server framework handles JSON-RPC 2.0 messages,
  capability negotiation (initialize/initialized), and dispatches tools/list, tools/call,
  resources/list, resources/read requests. The framework is tested with unit tests covering
  protocol message parsing and response formatting.
- mcp_tools_registered_complete: At least 8 MCP tools are registered: unity_compile, unity_test,
  unity_screenshot, unity_hierarchy, unity_dynamic_code, skill_list, skill_info, ai_log_recent.
  Each tool has a proper JSON Schema inputSchema and returns structured text content.
  tools/list returns all registered tools with names, descriptions, and schemas.
- mcp_resources_registered_complete: At least 3 MCP resources are registered:
  unity://context (Unity editor context), unity://ai-log (AI action log), unity://skills (skill manifests).
  resources/list returns resource URIs and descriptions. resources/read returns current data for each URI.
- mcp_stdio_transport_complete: `lux mcp serve` starts an MCP server on stdio. Claude Code or any
  MCP client can connect via stdio and invoke tools. A smoke test proves tool invocation through
  the stdio transport end-to-end.
- mcp_sse_transport_optional_complete: SSE transport is available as an optional mode. An MCP client
  can connect via SSE to the running gateway and invoke tools. Reuses existing gateway auth.
- mcp_migrates_mcp_helper_complete: The existing 4 tools from McpHelper~ (selected_file_context,
  lux_context, execute_shell, execute_git) are available as MCP tools in the Rust server.
  The Node.js McpHelper~ remains but is marked deprecated in its README.
- mcp_verification_complete: cargo test passes with new MCP unit tests. A smoke test in
  gateway_cli_smoke.rs proves `lux mcp serve` handles initialize, tools/list, and tools/call
  via stdio. McpHelper~ still builds and passes its own npm test.

